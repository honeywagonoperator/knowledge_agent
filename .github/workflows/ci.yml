name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: knowledge_engine
          POSTGRES_USER: knowledge_engine
          POSTGRES_PASSWORD: knowledge_engine
        options: >-
          --health-cmd "pg_isready -U knowledge_engine -d knowledge_engine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run mypy (typecheck)
        run: mypy src/ --disable-error-code=import-untyped --allow-untyped-decorators --disable-error-code=misc --disable-error-code=no-untyped-def --disable-error-code=no-untyped-call --disable-error-code=return-value --disable-error-code=arg-type --disable-error-code=no-any-return --disable-error-code=type-arg

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: knowledge_engine
          DB_USER: knowledge_engine
          DB_PASSWORD: knowledge_engine
        run: python -m pytest tests/ -v

  # Optional: build check
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build --wheel --sdist