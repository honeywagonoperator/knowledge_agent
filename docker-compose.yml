services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ke-postgres
    environment:
      POSTGRES_DB: knowledge_engine
      POSTGRES_USER: knowledge_engine
      POSTGRES_PASSWORD: knowledge_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ke-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
